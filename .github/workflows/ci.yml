name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build core
        run: swift build --package-path Packages/TsutaeCore

      - name: Test core
        run: swift test --package-path Packages/TsutaeCore

      - name: Build app
        run: |
          xcodebuild \
            -project App/Tsutae/Tsutae.xcodeproj \
            -scheme Tsutae \
            -destination 'platform=macOS' \
            -derivedDataPath .build/xcode \
            build

      - name: Check whitespace
        run: git diff --check
